<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Travel Buddy — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
    <div class="page">
        <header class="top">
            <div class="top-left">
                <div class="brand">✈️ Travel <span class="accent">Buddy</span></div>
                <div class="subtitle">Your dashboard</div>
            </div>
            <div class="top-right">
                <a class="btn ghost" href="/">Home</a>
                <button class="btn" type="button" id="logout-btn">Sign Out</button>
            </div>
        </header>

        <main class="container db-container">

            <!-- Profile Hero -->
            <section class="db-hero-card">
                <div class="db-avatar" id="db-avatar">?</div>
                <div class="db-hero-info">
                    <div class="db-hero-name" id="db-profile-name">Loading…</div>
                    <div class="db-hero-email" id="profile-email">—</div>
                    <div class="db-hero-meta" id="db-profile-meta"></div>
                </div>
                <div class="db-hero-stats">
                    <div class="db-stat">
                        <div class="db-stat-value" id="db-countries">—</div>
                        <div class="db-stat-label">Countries</div>
                    </div>
                    <div class="db-stat-divider"></div>
                    <div class="db-stat">
                        <div class="db-stat-value" id="db-trips-count">—</div>
                        <div class="db-stat-label">Saved Trips</div>
                    </div>
                </div>
                <!-- kept for JS compatibility -->
                <div id="auth-status" class="hidden"></div>
            </section>

            <!-- Saved Trips -->
            <section class="db-trips-card">
                <div class="db-trips-head">
                    <div>
                        <h3>Saved Trips</h3>
                        <div class="muted db-ai-status" id="ai-global-status">Manage your saved trip plans</div>
                    </div>
                    <button class="btn primary db-plan-btn" id="plan-trip-btn">+ Plan New Trip</button>
                </div>
                <div id="trips-list" class="db-trips-grid"></div>
            </section>

        </main>

        <!-- Chatbot Widget -->
        <div class="chatbot-widget" id="chatbot-widget">
            <button class="chatbot-toggle" id="chatbot-toggle" type="button" aria-expanded="false"
                aria-controls="chatbot-panel">
                <span class="chatbot-toggle-icon">🤖</span>
                <span>AI Trip Assistant</span>
            </button>

            <section class="chatbot-panel hidden" id="chatbot-panel" role="dialog" aria-label="AI Trip Assistant">
                <div class="chatbot-header">
                    <div class="chatbot-title-wrap">
                        <div class="chatbot-title">AI Trip Assistant</div>
                        <div class="chatbot-subtitle">Ask about your saved trips</div>
                    </div>
                    <button class="chatbot-close" id="chatbot-close" type="button" aria-label="Close chatbot">✕</button>
                </div>

                <div class="chatbot-messages" id="chatbot-messages" aria-live="polite"></div>

                <form class="chatbot-form" id="chatbot-form" novalidate>
                    <label class="chatbot-label" for="chatbot-input" id="chatbot-input-label">Ask anything about your
                        trip</label>
                    <div class="chatbot-input-row">
                        <input id="chatbot-input" class="chatbot-input" type="text"
                            placeholder="e.g. 5-day Tokyo itinerary" autocomplete="off" required />
                        <button class="btn primary chatbot-send" type="submit">Send</button>
                    </div>
                </form>

                <button class="chatbot-reset" id="chatbot-reset" type="button">Start over</button>
            </section>
        </div>
    </div>

    <script src="/static/profile.js"></script>
</body>

</html>
